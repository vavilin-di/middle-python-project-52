{% extends '../common/common_template.html' %}
{% load django_bootstrap5 %}
{% block content %}
    <h1>Изменение статуса</h1>
    <form action="{% url 'statuses:update' status.id %}" method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        {% bootstrap_button "Изменить" button_type="submit" button_class="btn-primary" %}
    </form>
{% endblock %}
