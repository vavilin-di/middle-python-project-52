{% extends '../common/common_template.html' %}
{% load django_bootstrap5 %}
{% block content %}
    <h1>Удаление статуса</h1>
    <form action="{% url 'statuses:delete' status.id %}" method="post">
        {% csrf_token %}
        <p>Вы уверены, что хотите удалить статус {{ status.name }}?</p>
        {% bootstrap_button "Да, удалить" button_type="submit" button_class="btn-primary" %}
    </form>
{% endblock %}
