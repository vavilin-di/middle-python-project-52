name: CI Pipeline

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality-check.yml

  unit-tests:
    needs: code-quality
    uses: ./.github/workflows/unit-testing.yml
    secrets:
      SECRET_KEY_FOR_TESTS: ${{ secrets.SECRET_KEY_FOR_TESTS }}

  sonarcloud:
    needs: unit-tests
    uses: ./.github/workflows/sonarcloud.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}