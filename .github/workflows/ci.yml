name: CI Pipeline

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality-check.yml

  unit-tests:
    needs: code-quality
    uses: ./.github/workflows/unit-testing.yml
    secrets: inherit

  sonarcloud:
    needs: unit-tests
    uses: ./.github/workflows/sonarcloud.yml
    secrets: inherit