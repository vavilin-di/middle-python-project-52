name: unit-testing

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Type check with mypy
        run: uv run mypy .